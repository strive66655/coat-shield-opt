experiment:
  name: exp_baseline_e
  output_root: experiments
  random_state: 42
  test_size: 0.2

data:
  file_path: data/processed/e_clean.csv
  file_type: csv
  use_record_filter: true
  record_filter_column: record_type
  record_filter_value: design_candidate

features:
  input_cols:
    - Al_thickness_um
    - B4C_thickness_um
    - W_thickness_um
    - ZnO_thickness_um

target:
  type: multi_improvement
  output_cols:
    - improvement_1Mev
    - improvement_5Mev
    - improvement_10Mev

models:
  enabled:
    RandomForest: false
    XGBoost: false
    ResidualMLP: true

  RandomForest:
    n_estimators: 300
    max_depth: null
    min_samples_split: 2
    min_samples_leaf: 1
    n_jobs: -1

  XGBoost:
    n_estimators: 300
    max_depth: 4
    learning_rate: 0.05
    subsample: 0.9
    colsample_bytree: 0.9
    objective: reg:squarederror
    n_jobs: -1

  ResidualMLP:
    hidden_dim: 64
    num_blocks: 3
    dropout: 0.1
    lr: 0.001
    weight_decay: 0.00001
    epochs: 500
    batch_size: 16
    patience: 50

output:
  save_clean_dataset: true
  save_models: true
  save_plots: true
  save_metrics: true
  save_config_copy: true
